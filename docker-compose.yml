version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: home-guardian-backend
    # Host networking is required to allow python to directly query the 
    # host PCIe wireless interface (wlo1) telemetry and send ping diagnostic packages!
    network_mode: host
    volumes:
      - ./wifi_guardian.db:/app/wifi_guardian.db
      - ./server.log:/app/server.log
    restart: unless-stopped
    environment:
      - PORT=8080
      - DEVICE=cpu

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: home-guardian-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
